<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title_zh}} | 论文解读</title>
    <style>
        /* CSS Reset & Variables */
        :root {
            --color-primary: #FF6B35;
            --color-secondary: #F7C59F;
            --color-dark: #2D3047;
            --color-light: #EFEFD0;
            --color-bg: #FFFAF6;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --shadow-soft: 0 4px 20px rgba(45, 48, 71, 0.08);
            --shadow-hover: 0 8px 30px rgba(45, 48, 71, 0.12);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--color-bg);
            color: var(--color-dark);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, var(--color-bg) 0%, var(--color-secondary) 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 80%;
            height: 150%;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.08) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .hero-content {
            max-width: 900px;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 1s ease forwards 0.3s;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            color: var(--color-dark);
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .hero .subtitle {
            font-size: 1.25rem;
            color: var(--color-primary);
            font-weight: 500;
            margin-bottom: 2rem;
        }

        .hero .meta {
            font-size: 0.95rem;
            color: #666;
        }

        .hero .meta span {
            margin: 0 1rem;
        }

        /* Section Styling */
        section {
            padding: 6rem 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--color-dark);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 1.5em;
            background: var(--color-primary);
            border-radius: 2px;
        }

        /* Content Blocks */
        .content-block {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(30px);
        }

        .content-block.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .content-block:hover {
            box-shadow: var(--shadow-hover);
        }

        .lead-in {
            background: linear-gradient(135deg, var(--color-light) 0%, #fff 100%);
            border-left: 4px solid var(--color-primary);
        }

        .analogy-box {
            background: linear-gradient(135deg, var(--color-secondary) 0%, #fff 50%);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .analogy-box h4 {
            color: var(--color-primary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
        }

        .highlight-box {
            background: linear-gradient(135deg, var(--color-primary) 0%, #ff8c5a 100%);
            color: white;
            border-radius: 12px;
            padding: 2rem;
            margin: 2rem 0;
        }

        .highlight-box h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .layer-explanation {
            margin: 1.5rem 0;
            padding-left: 1.5rem;
            border-left: 2px solid var(--color-secondary);
        }

        .layer-1 { border-color: #4CAF50; }
        .layer-2 { border-color: #2196F3; }
        .layer-3 { border-color: #9C27B0; }

        .layer-label {
            display: inline-block;
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .layer-1 .layer-label { background: #E8F5E9; color: #2E7D32; }
        .layer-2 .layer-label { background: #E3F2FD; color: #1565C0; }
        .layer-3 .layer-label { background: #F3E5F5; color: #7B1FA2; }

        /* Images Grid */
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .image-card {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
            opacity: 0;
            transform: scale(0.95);
        }

        .image-card.visible {
            opacity: 1;
            transform: scale(1);
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .image-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .image-caption {
            padding: 1rem;
            background: white;
            font-size: 0.85rem;
            color: #666;
            text-align: center;
        }

        /* Impact Cards */
        .impact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .impact-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
        }

        .impact-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .impact-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .impact-card h4 {
            color: var(--color-dark);
            margin-bottom: 0.5rem;
        }

        .impact-card p {
            font-size: 0.9rem;
            color: #666;
        }

        /* Summary */
        .summary-box {
            background: linear-gradient(135deg, var(--color-dark) 0%, #4a4f6e 100%);
            color: white;
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
        }

        .summary-box h3 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .takeaways {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .takeaway {
            background: rgba(255, 255, 255, 0.15);
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        /* Footer */
        footer {
            background: var(--color-dark);
            color: white;
            text-align: center;
            padding: 3rem 2rem;
            margin-top: 4rem;
        }

        footer a {
            color: var(--color-secondary);
            text-decoration: none;
        }

        /* Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--color-primary);
            width: 0%;
            z-index: 1000;
            transition: width 0.1s;
        }

        /* Responsive */
        @media (max-width: 768px) {
            section { padding: 4rem 1.5rem; }
            .content-block { padding: 1.5rem; }
            .hero { padding: 3rem 1.5rem; }
            .highlight-box { padding: 1.5rem; }
        }

        /* Print Styles */
        @media print {
            .hero { min-height: auto; padding: 2rem; }
            section { padding: 1rem 0; }
            .content-block { box-shadow: none; break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <p class="subtitle">📄 论文解读</p>
            <h1>{{title_zh}}</h1>
            <p class="subtitle">{{title_en}}</p>
            <p class="meta">
                {{#authors}}<span>{{name}}</span>{{/authors}}
                <span>•</span>
                <span>{{date}}</span>
            </p>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        {{content}}
    </main>

    <!-- Footer -->
    <footer>
        <p>🎯 由 Claude Agent 自动生成</p>
        <p style="margin-top: 0.5rem; opacity: 0.7;">基于 arXiv 论文: {{paper_id}}</p>
    </footer>

    <script>
        // Progress Bar
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById('progressBar').style.width = scrolled + '%';
        });

        // Intersection Observer for Scroll Animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        // Observe all animated elements
        document.querySelectorAll('.content-block, .image-card, .impact-card').forEach(el => {
            observer.observe(el);
        });

        // Smooth scroll for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
    </script>
</body>
</html>
