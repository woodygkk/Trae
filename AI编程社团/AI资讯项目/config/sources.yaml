    url: "https://36kr.com/feed"
    category: "tech_media"
    authority_score: 18
    enabled: true

# API Sources (optional - requires additional setup)
api_sources:
  arxiv:
    enabled: true
    categories:
      - "cs.AI"
      - "cs.LG"
    max_results: 30
    authority_score: 28

  # Twitter scraping (requires playwright: pip install playwright && playwright install chromium)
  twitter:
    enabled: true
    max_tweets_per_account: 10
    # Accounts to scrape (defined in fetch_twitter.py TWITTER_ACCOUNTS)

# Settings
settings:
  fetch_interval_hours: 1
  retention_days: 30
  max_articles_per_fetch: 200
